{% extends 'base.html' %}
{% load static %}
{% block title %}Practice — Presentation Coach{% endblock %}
{% block extra_head %}
<script type="module" src="{% static 'js/coach.js' %}"></script>
{% endblock %}
{% block content %}
<div class="relative h-screen flex flex-col">
  <!-- Top bar -->
  <div class="flex justify-between items-center px-6 py-3 bg-neutral-900 z-10">
    <div class="flex items-center gap-4">
      <span id="timerDisplay" class="text-neutral-400 text-sm font-mono">00:00</span>
      <span id="statusText" class="text-neutral-500 text-sm"></span>
    </div>
    <div class="flex items-center gap-3">
      <button id="toggleVideoBtn" class="text-neutral-400 hover:text-white text-sm transition-colors px-2 py-1 rounded-md hover:bg-neutral-800" title="Toggle camera view">
        <svg id="toggleIcon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
        </svg>
      </button>
      <button id="getFeedbackBtn" class="bg-white text-neutral-900 text-sm font-medium px-4 py-2 rounded-md hover:opacity-90 transition-opacity">
        Get Feedback
      </button>
    </div>
  </div>

  <!-- Camera area -->
  <div class="flex-1 relative bg-black flex items-center justify-center overflow-hidden">
    <video id="webcam" autoplay playsinline class="hidden"></video>
    <canvas id="pose-canvas" class="max-h-full max-w-full"></canvas>

    <!-- Start overlay -->
    <div id="startOverlay" class="absolute inset-0 flex flex-col items-center justify-center z-20 bg-black/80">
      <h2 class="text-white text-2xl font-semibold mb-2">Ready to practice?</h2>
      <p class="text-neutral-400 text-sm mb-8">Your camera and mic will be used. Nothing is recorded.</p>
      <button id="startBtn" class="bg-white text-neutral-900 text-base font-medium px-8 py-3 rounded-full hover:opacity-90 transition-opacity shadow-sm">
        Start Practice
      </button>
    </div>

    <p id="loadingText" class="text-neutral-500 text-xl hidden">Starting camera...</p>
  </div>
</div>
{% endblock %}
